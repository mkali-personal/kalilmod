<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalilmod</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --text: #1a1d23; --muted: #5b6472;
    --border: #e4e7ec; --accent: #4f46e5; --accent-hover: #4338ca; --accent-soft: #eef2ff;
    --good: #15803d; --good-soft: #dcfce7; --bad: #b91c1c; --bad-soft: #fee2e2;
    --hint-bg: #fffbeb; --hint-border: #fcd34d;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --surface: #171a21; --text: #e6e8eb; --muted: #9aa4b2;
      --border: #262b34; --accent: #818cf8; --accent-hover: #a5b4fc; --accent-soft: #1e2233;
      --good: #4ade80; --good-soft: #14301f; --bad: #f87171; --bad-soft: #33181a;
      --hint-bg: #26220f; --hint-border: #4d431a;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.25);
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.65;
    max-width: 720px; margin: 0 auto; padding: 2.5em 1.2em 4em; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header { margin-bottom: 1.5em; }
  h1 { font-size: 1.7rem; margin: 0; letter-spacing: -0.01em; }
  .tagline { color: var(--muted); margin: .2em 0 0; font-size: .95rem; }

  .block {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.3em 1.5em; margin: 1.1em 0; box-shadow: var(--shadow);
  }
  .block > :first-child { margin-top: 0; }
  .block > :last-child { margin-bottom: 0; }
  .block.reveal { animation: rise .35s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .block h1, .block h2, .block h3 { line-height: 1.3; }
  .block a { color: var(--accent); text-decoration: none; }
  .block a:hover { text-decoration: underline; }
  .block code { background: var(--accent-soft); padding: .1em .35em; border-radius: 5px; font-size: .9em; }
  .block pre { background: var(--accent-soft); padding: 1em; border-radius: 10px; overflow-x: auto; }
  .block pre code { background: none; padding: 0; }
  blockquote { border-left: 3px solid var(--border); margin: .8em 0; padding-left: 1em; color: var(--muted); }

  .btn {
    font: inherit; font-weight: 500; padding: .55em 1.15em; border-radius: 9px;
    border: 1px solid transparent; cursor: pointer; transition: all .15s ease; margin: .4em .4em 0 0;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn.ghost { background: transparent; color: var(--muted); border-color: var(--border); }
  .btn.ghost:hover { color: var(--text); border-color: var(--accent); }

  /* Quiz */
  .quiz .qlabel { font-weight: 600; color: var(--accent); font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
  .quiz .qtext { font-weight: 500; margin: .2em 0 1em; }
  .options { display: flex; flex-direction: column; gap: .55em; }
  label.option {
    display: flex; align-items: center; gap: .75em; padding: .75em .95em;
    border: 1px solid var(--border); border-radius: 11px; cursor: pointer; transition: all .15s ease;
  }
  label.option:hover { border-color: var(--accent); background: var(--accent-soft); }
  label.option:has(input:checked) { border-color: var(--accent); background: var(--accent-soft); }
  label.option:has(input:disabled) { cursor: default; }
  .quiz.correct label.option:has(input:checked) { border-color: var(--good); background: var(--good-soft); }
  .quiz.revealed label.option:has(input:checked) { border-color: var(--bad); background: var(--bad-soft); }
  input[type=radio] { accent-color: var(--accent); width: 1.05em; height: 1.05em; flex: none; }

  .hint {
    background: var(--hint-bg); border: 1px solid var(--hint-border); border-left-width: 4px;
    padding: .6em .85em; border-radius: 9px; margin: .6em 0; font-size: .95em;
  }
  .feedback-right { color: var(--good); font-weight: 500; }
  .feedback-wrong { color: var(--bad); font-weight: 500; }

  .feedbackbox { border-style: dashed; background: transparent; }
  .feedbackbox p { margin-top: 0; color: var(--muted); font-size: .95em; }
  textarea {
    width: 100%; font: inherit; padding: .65em .75em; border: 1px solid var(--border);
    border-radius: 9px; background: var(--surface); color: var(--text); resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .video-embed { position: relative; padding-top: 56.25%; border-radius: 11px; overflow: hidden; margin: .3em 0; }
  .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  /* Subject picker */
  .subject-list { display: flex; flex-direction: column; gap: .65em; }
  .subject-card {
    display: flex; justify-content: space-between; align-items: center; gap: 1em;
    width: 100%; text-align: left; font: inherit; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1em 1.25em; box-shadow: var(--shadow); transition: all .15s ease; color: var(--text);
  }
  .subject-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .sc-title { font-weight: 600; }
  .sc-status { color: var(--muted); font-size: .9em; white-space: nowrap; }
  .toolbar { margin-top: 1.5em; padding-top: 1.2em; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <h1 id="title">Kalilmod</h1>
  <p class="tagline">קל ללמוד — learn by doing, one small step at a time.</p>
</header>
<div id="app">Loading…</div>

<script>
"use strict";
const $app = document.getElementById("app");
let subject = null, lessonFile = null, lesson = null;
let progress = {};        // whole progress.json for the subject
let state = null;         // progress[lessonFile]
let animatedThrough = -1; // highest block index already animated (avoids re-animating on re-render)

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

function renderMath(node) {
  renderMathInElement(node, { delimiters: [
    { left: "$$", right: "$$", display: true },
    { left: "$", right: "$", display: false } ] });
}

async function saveProgress() {
  progress[lessonFile] = state;
  await fetch("/api/progress?subject=" + encodeURIComponent(subject), {
    method: "POST", body: JSON.stringify(progress) });
}

async function main() {
  document.getElementById("title").textContent = "Kalilmod";
  const subjects = await (await fetch("/api/subjects")).json();
  if (subjects.length === 0) { $app.textContent = "No subjects found in subjects/."; return; }
  $app.innerHTML = "";
  $app.appendChild(el("h2", null, "Choose a lesson"));
  const list = el("div", "subject-list");
  for (const s of subjects) {
    const prog = await (await fetch("/api/progress?subject=" + encodeURIComponent(s.subject))).json();
    for (const l of s.lessons) {
      const st = prog[l];
      const status = !st ? "not started"
        : st.currentBlock >= st.totalBlocks ? "✓ completed"
        : `in progress · ${st.currentBlock + 1}/${st.totalBlocks}`;
      const card = el("button", "subject-card",
        `<span class="sc-title">${s.subject} — ${l}</span><span class="sc-status">${status}</span>`);
      card.onclick = () => openLesson(s.subject, l);
      list.appendChild(card);
    }
  }
  $app.appendChild(list);
}

async function openLesson(subj, file) {
  subject = subj; lessonFile = file; animatedThrough = -1;
  lesson = await (await fetch(`/api/lesson?subject=${encodeURIComponent(subj)}&lesson=${encodeURIComponent(file)}`)).json();
  progress = await (await fetch("/api/progress?subject=" + encodeURIComponent(subj))).json();
  state = progress[lessonFile] || { currentBlock: 0, quiz: {} };
  state.totalBlocks = lesson.blocks.length;
  document.getElementById("title").textContent = lesson.title;
  renderLesson();
}

function renderLesson() {
  $app.innerHTML = "";
  const upto = Math.min(state.currentBlock, lesson.blocks.length - 1);
  for (let i = 0; i <= upto; i++) {
    const node = renderBlock(lesson.blocks[i], i);
    if (i === upto && i > animatedThrough) { node.classList.add("reveal"); animatedThrough = i; }
    $app.appendChild(node);
  }
  if (state.currentBlock >= lesson.blocks.length) {
    $app.appendChild(el("div", "block reveal",
      "<b>Lesson complete! 🎉</b> Return to your Claude Code terminal session to generate the next lesson."));
  }
  $app.appendChild(feedbackBox());

  const toolbar = el("div", "toolbar");
  const back = el("button", "btn ghost", "← All lessons");
  back.onclick = main;
  const restart = el("button", "btn ghost", "⟲ Restart lesson");
  restart.onclick = () => {
    state = { currentBlock: 0, quiz: {}, totalBlocks: lesson.blocks.length };
    animatedThrough = -1;
    saveProgress();
    renderLesson();
  };
  toolbar.appendChild(back);
  toolbar.appendChild(restart);
  $app.appendChild(toolbar);
  renderMath($app);
}

// Always-available channel for the student to message the teacher mid-lesson.
// Saved into progress.json (state.feedback); the teacher reads it and edits the
// not-yet-seen blocks, after which the student reloads and resumes from currentBlock.
function feedbackBox() {
  const wrap = el("div", "block feedbackbox",
    "<p>💬 <b>Message the teacher</b> (optional): stuck, want more detail, too hard or too easy? " +
    "Write it, send, then go back to your terminal and tell the teacher you left feedback.</p>");
  const ta = el("textarea");
  ta.rows = 2;
  const btn = el("button", "btn primary", "Send feedback");
  const msg = el("span");
  msg.style.marginLeft = ".6em";
  btn.onclick = () => {
    const text = ta.value.trim();
    if (!text) { msg.className = "feedback-wrong"; msg.textContent = "Write something first."; return; }
    state.feedback = state.feedback || [];
    state.feedback.push({ block: state.currentBlock, text: text, ts: new Date().toISOString() });
    saveProgress();
    ta.value = "";
    msg.className = "feedback-right";
    msg.textContent = "Saved. Return to your terminal so the teacher can adjust the lesson.";
  };
  const row = el("div");
  row.style.marginTop = ".6em";
  row.appendChild(btn);
  row.appendChild(msg);
  wrap.appendChild(ta);
  wrap.appendChild(row);
  return wrap;
}

function unlockNext() {
  state.currentBlock++;
  saveProgress();
  renderLesson();
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

function continueButton() {
  const btn = el("button", "btn primary", "Continue →");
  btn.onclick = unlockNext;
  return btn;
}

function renderBlock(block, index) {
  const div = el("div", "block " + block.type);
  const isCurrent = index === state.currentBlock;

  if (block.type === "explanation") {
    div.innerHTML = marked.parse(block.markdown);
    if (isCurrent) div.appendChild(continueButton());
  } else if (block.type === "link") {
    div.innerHTML = `<a href="${block.url}" target="_blank">${block.title}</a><p>${block.why || ""}</p>`;
    if (isCurrent) div.appendChild(continueButton());
  } else if (block.type === "video") {
    const yt = (block.url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/) || [])[1];
    const player = yt
      ? `<div class="video-embed"><iframe src="https://www.youtube.com/embed/${yt}" allowfullscreen></iframe></div>
         <small>Video not playing? Some owners disable embedding — <a href="${block.url}" target="_blank">watch it on YouTube</a>.</small>`
      : `<a href="${block.url}" target="_blank">▶ ${block.title}</a>`;
    div.innerHTML = `<p><b>${block.title}</b></p>${player}<p>${block.focus || ""}</p>`;
    if (isCurrent) div.appendChild(continueButton());
  } else if (block.type === "quiz-choice") {
    renderQuiz(div, block, index);
  } else {
    div.textContent = `[Unsupported block type: ${block.type}]`;
    if (isCurrent) div.appendChild(continueButton());
  }
  return div;
}

function newQuizState(block) {
  // Shuffle option order once, so the correct answer is not always in the same
  // position regardless of how the teacher ordered them in the JSON.
  const order = block.options.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  return { retries: 0, correct: false, revealed: false, order: order };
}

function renderQuiz(div, block, index) {
  let qs = state.quiz[index];
  if (!qs) { qs = state.quiz[index] = newQuizState(block); saveProgress(); }
  if (!qs.order || qs.order.length !== block.options.length) qs.order = newQuizState(block).order;
  const answered = qs.correct || qs.revealed;
  div.classList.add(qs.correct ? "correct" : qs.revealed ? "revealed" : "open");
  div.innerHTML = `<div class="qlabel">Quiz</div><div class="qtext">${block.question}</div>`;

  const form = el("form", "options");
  qs.order.forEach((origIdx) => {
    const checked = answered && origIdx === block.answer ? "checked" : "";
    const label = el("label", "option",
      `<input type="radio" name="q${index}" value="${origIdx}" ${checked} ${answered ? "disabled" : ""}> <span>${block.options[origIdx]}</span>`);
    form.appendChild(label);
  });
  div.appendChild(form);

  const feedback = el("p");
  div.appendChild(feedback);
  if (qs.correct) { feedback.className = "feedback-right"; feedback.textContent = "Correct!"; }
  if (qs.revealed) { feedback.className = "feedback-wrong"; feedback.textContent = "Answer shown: " + block.options[block.answer]; }
  if (answered) return;

  const hints = block.hints || [];
  for (let h = 0; h < Math.min(qs.retries, hints.length); h++) {
    div.appendChild(el("div", "hint", "<b>Hint:</b> " + hints[h]));
  }

  const check = el("button", "btn primary", "Check answer");
  check.onclick = () => {
    const sel = form.querySelector("input:checked");
    if (!sel) { feedback.className = "feedback-wrong"; feedback.textContent = "Pick an answer first."; return; }
    if (Number(sel.value) === block.answer) {
      qs.correct = true;
      unlockNext();
    } else {
      qs.retries++;
      saveProgress();
      renderLesson();
    }
  };
  div.appendChild(check);

  if (qs.retries >= hints.length && qs.retries > 0) {
    const reveal = el("button", "btn ghost", "Show answer");
    reveal.onclick = () => { qs.revealed = true; unlockNext(); };
    div.appendChild(reveal);
  }
  if (qs.retries > 0) {
    feedback.className = "feedback-wrong";
    feedback.textContent = "Not quite — try again.";
  }
}

main();
</script>
</body>
</html>
