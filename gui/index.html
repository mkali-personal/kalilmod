<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalilmod</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --text: #1a1d23; --muted: #5b6472;
    --border: #e4e7ec; --accent: #4f46e5; --accent-hover: #4338ca; --accent-soft: #eef2ff;
    --good: #15803d; --good-soft: #dcfce7; --bad: #b91c1c; --bad-soft: #fee2e2;
    --hint-bg: #fffbeb; --hint-border: #fcd34d;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --surface: #171a21; --text: #e6e8eb; --muted: #9aa4b2;
      --border: #262b34; --accent: #818cf8; --accent-hover: #a5b4fc; --accent-soft: #1e2233;
      --good: #4ade80; --good-soft: #14301f; --bad: #f87171; --bad-soft: #33181a;
      --hint-bg: #26220f; --hint-border: #4d431a;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.25);
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.65;
    max-width: 720px; margin: 0 auto; padding: 2.5em 1.2em 4em; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header { margin-bottom: 1.5em; }
  h1 { font-size: 1.7rem; margin: 0; letter-spacing: -0.01em; }
  .tagline { color: var(--muted); margin: .2em 0 0; font-size: .95rem; }

  /* Teacher-presence badge: live indicator of whether a /teach-me session is
     actually listening, so the student never waits on a review into the void. */
  #teacher-badge {
    position: fixed; top: 14px; right: 16px; z-index: 20; display: none;
    align-items: center; gap: .5em; font-size: .82rem; font-weight: 500;
    padding: .4em .8em; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); box-shadow: var(--shadow); color: var(--muted);
  }
  #teacher-badge .tb-dot { width: .6em; height: .6em; border-radius: 50%; background: var(--muted); flex: none; }
  #teacher-badge.online { color: var(--good); border-color: var(--good); }
  #teacher-badge.online .tb-dot { background: var(--good); box-shadow: 0 0 0 3px var(--good-soft); }
  #teacher-badge.working .tb-dot { background: var(--hint-border); }
  #teacher-badge.offline { color: var(--bad); border-color: var(--bad); }
  #teacher-badge.offline .tb-dot { background: var(--bad); }
  /* Honest note appended to an "awaiting the teacher" message when none is connected. */
  .tb-note { margin-top: .6em; color: var(--bad); font-weight: 500; font-size: .92em; }
  .tb-note code { background: var(--bad-soft); }

  .block {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.3em 1.5em; margin: 1.1em 0; box-shadow: var(--shadow);
    scroll-margin-top: 120px;  /* keep the just-answered block's feedback visible when scrolling to the next */
  }
  .block > :first-child { margin-top: 0; }
  .block > :last-child { margin-bottom: 0; }
  .block.reveal { animation: rise .35s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .block h1, .block h2, .block h3 { line-height: 1.3; }
  .block a { color: var(--accent); text-decoration: none; }
  .block a:hover { text-decoration: underline; }
  .block code { background: var(--accent-soft); padding: .1em .35em; border-radius: 5px; font-size: .9em; }
  .block pre { background: var(--accent-soft); padding: 1em; border-radius: 10px; overflow-x: auto; }
  .block pre code { background: none; padding: 0; }
  blockquote { border-left: 3px solid var(--border); margin: .8em 0; padding-left: 1em; color: var(--muted); }

  .btn {
    font: inherit; font-weight: 500; padding: .55em 1.15em; border-radius: 9px;
    border: 1px solid transparent; cursor: pointer; transition: all .15s ease; margin: .4em .4em 0 0;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn.ghost { background: transparent; color: var(--muted); border-color: var(--border); }
  .btn.ghost:hover { color: var(--text); border-color: var(--accent); }

  /* Quiz */
  .qlabel { font-weight: 600; color: var(--accent); font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
  .qtext { font-weight: 500; margin: .2em 0 1em; }
  .options { display: flex; flex-direction: column; gap: .55em; }
  label.option {
    display: flex; align-items: center; gap: .75em; padding: .75em .95em;
    border: 1px solid var(--border); border-radius: 11px; cursor: pointer; transition: all .15s ease;
  }
  label.option:hover { border-color: var(--accent); background: var(--accent-soft); }
  label.option:has(input:checked) { border-color: var(--accent); background: var(--accent-soft); }
  label.option:has(input:disabled) { cursor: default; }
  .quiz.correct label.option:has(input:checked) { border-color: var(--good); background: var(--good-soft); }
  .quiz.revealed label.option:has(input:checked) { border-color: var(--bad); background: var(--bad-soft); }
  input[type=radio] { accent-color: var(--accent); width: 1.05em; height: 1.05em; flex: none; }

  .hint {
    background: var(--hint-bg); border: 1px solid var(--hint-border); border-left-width: 4px;
    padding: .6em .85em; border-radius: 9px; margin: .6em 0; font-size: .95em;
  }
  .feedback-right { color: var(--good); font-weight: 500; }
  .feedback-wrong { color: var(--bad); font-weight: 500; }

  .feedbackbox { border-style: dashed; background: transparent; }
  .feedbackbox p { margin-top: 0; color: var(--muted); font-size: .95em; }
  textarea {
    width: 100%; font: inherit; padding: .65em .75em; border: 1px solid var(--border);
    border-radius: 9px; background: var(--surface); color: var(--text); resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .video-embed { position: relative; padding-top: 56.25%; border-radius: 11px; overflow: hidden; margin: .3em 0; }
  .video-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  .plotly-graph { width: 100%; }
  .caption { color: var(--muted); font-size: .9em; margin: .5em 0 0; }

  .your-answer { background: var(--accent-soft); border-radius: 9px; padding: .6em .8em; margin: .6em 0; }
  .review { background: var(--surface); border: 1px solid var(--border); border-left-width: 4px; border-radius: 9px; padding: .6em .8em; margin: .6em 0; }
  .review.correct { border-left-color: var(--good); }
  .review.incorrect { border-left-color: var(--bad); }

  /* Orienting "lead" callout: gentle tinted box between a block's title and its content. */
  .lead {
    background: var(--accent-soft); border: 1px solid var(--border); border-left: 4px solid var(--accent);
    border-radius: 10px; padding: .65em .85em; margin: .7em 0 1em; font-size: .97em;
  }

  .review-round h2 { margin-top: 0; }
  .review-item { border-top: 1px solid var(--border); margin-top: 1.1em; padding-top: 1.1em; }
  .review-item:first-of-type { border-top: 0; margin-top: .3em; padding-top: 0; }
  .review-hidden { opacity: .9; }

  /* Subject picker */
  .subject-list { display: flex; flex-direction: column; gap: .65em; }
  .subject-card {
    display: flex; justify-content: space-between; align-items: center; gap: 1em;
    width: 100%; text-align: left; font: inherit; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1em 1.25em; box-shadow: var(--shadow); transition: all .15s ease; color: var(--text);
  }
  .subject-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .sc-title { font-weight: 600; }
  .sc-status { color: var(--muted); font-size: .9em; white-space: nowrap; }
  .toolbar { margin-top: 1.5em; padding-top: 1.2em; border-top: 1px solid var(--border); }

  /* First-run overlay: ask whether to include free-text (written) questions. */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.45); padding: 1.2em;
  }
  .overlay-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 1.7em 1.9em; max-width: 470px; text-align: center;
  }
  .overlay-card h2 { margin: 0 0 .4em; }
  .overlay-card p { color: var(--muted); font-size: .95em; margin: 0 0 1.1em; }
  .overlay-card .btn { margin: .3em; }

  /* Progress rail: one dot per content part, down the left margin. */
  #progress-rail {
    position: fixed; left: 24px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; justify-content: center;
    gap: 2.55em; max-height: 90vh; z-index: 10;
  }
  #progress-rail:empty { display: none; }
  #progress-rail::before {
    content: ""; position: absolute; left: 50%; top: 4px; bottom: 4px;
    width: 2px; background: var(--border); transform: translateX(-50%); z-index: -1;
  }
  #progress-rail .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: transparent; border: 2px solid var(--border); transition: all .2s ease;
  }
  #progress-rail .dot.passed { background: var(--accent); border-color: var(--accent); opacity: .5; cursor: pointer; }
  #progress-rail .dot.current { background: var(--accent); border-color: var(--accent);
    transform: scale(1.35); box-shadow: 0 0 0 3px var(--accent-soft); cursor: pointer; }
  @media (max-width: 940px) { #progress-rail { display: none; } }
</style>
</head>
<body>
<div id="teacher-badge" title="Whether a live /teach-me session is currently listening"></div>
<header>
  <h1 id="title">Kalilmod</h1>
  <p class="tagline">קלילמוד — learn by doing, one small step at a time.</p>
</header>
<div id="app">Loading…</div>
<div id="progress-rail" aria-hidden="true"></div>

<script>
"use strict";
const $app = document.getElementById("app");
let subject = null, lessonFile = null, lesson = null;
let progress = {};        // whole progress.json for the subject
let state = null;         // progress[lessonFile]
let animatedThrough = -1; // highest block index already animated (avoids re-animating on re-render)
let pendingGraphs = [];   // graph blocks waiting to be plotted after they're in the DOM
let mode = "dynamic";     // "dynamic" (live Claude) or "static" (self-assessed); from /api/mode
let reviews = {};         // reviews.json for the subject (Claude-owned, polled read-only)
let pollTimer = null;
let lastLessonJSON = "";  // to detect live lesson edits (feedback-driven)
let lastReviewsJSON = ""; // to detect newly-arrived free-text reviews
let teacherTimer = null;          // polls /api/teacher for listener presence
let teacherOfflineSince = null;   // when we first saw "no listener" (drives the grace period)
let teacherState = "unknown";     // "online" | "working" | "offline" | "down" | "unknown"
const TEACHER_GRACE_MS = 45000;   // a teacher busy authoring briefly leaves /api/wait — don't cry "offline" instantly
let freeTextEnabled = true;       // show free-text (written) questions? per-subject choice (progress.prefs.freeText)

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

function renderMath(node) {
  renderMathInElement(node, { delimiters: [
    { left: "$$", right: "$$", display: true },
    { left: "$", right: "$", display: false } ] });
}

async function saveProgress() {
  progress[lessonFile] = state;
  progress.prefs = { freeText: freeTextEnabled };  // carried to the teacher (GUI still owns progress.json)
  await fetch("/api/progress?subject=" + encodeURIComponent(subject) + "&lesson=" + encodeURIComponent(lessonFile), {
    method: "POST", body: JSON.stringify(progress) });
}

// Wake the live teacher session: a backgrounded `curl /api/wait` in the Claude
// session unblocks on this and re-invokes it (see serve.py). Only meaningful in
// dynamic mode; harmless (and silently ignored) if no teacher is listening.
async function notify(event) {
  if (mode !== "dynamic") return;
  try {
    await fetch("/api/notify", { method: "POST", body: JSON.stringify(event) });
  } catch (e) { /* no teacher armed right now — fine */ }
}

async function main() {
  stopPolling();
  subject = null; lessonFile = null; lesson = null;
  document.getElementById("progress-rail").innerHTML = "";
  document.getElementById("title").textContent = "Kalilmod";
  const subjects = await (await fetch("/api/subjects")).json();
  if (subjects.length === 0) { $app.textContent = "No subjects found in subjects/."; return; }
  $app.innerHTML = "";
  $app.appendChild(el("h2", null, "Choose a lesson"));
  const list = el("div", "subject-list");
  for (const s of subjects) {
    let prog = {};
    // Never let one subject's missing/corrupt progress blank the whole picker.
    try { prog = await (await fetch("/api/progress?subject=" + encodeURIComponent(s.subject))).json(); }
    catch (e) { /* treat as not started */ }
    for (const l of s.lessons) {
      const st = prog[l];
      const status = !st ? "not started"
        : st.currentBlock >= st.totalBlocks ? "✓ completed"
        : `in progress · ${st.currentBlock + 1}/${st.totalBlocks}`;
      const card = el("button", "subject-card",
        `<span class="sc-title">${s.subject} — ${l}</span><span class="sc-status">${status}</span>`);
      card.onclick = () => { location.hash = "subject=" + encodeURIComponent(s.subject) + "&lesson=" + encodeURIComponent(l); };
      list.appendChild(card);
    }
  }
  $app.appendChild(list);
}

async function openLesson(subj, file) {
  subject = subj; lessonFile = file; animatedThrough = -1;
  const h = "subject=" + encodeURIComponent(subj) + "&lesson=" + encodeURIComponent(file);
  if (location.hash.slice(1) !== h) location.hash = h;  // so F5 restores this lesson
  lesson = await (await fetch(`/api/lesson?subject=${encodeURIComponent(subj)}&lesson=${encodeURIComponent(file)}`)).json();
  lastLessonJSON = JSON.stringify(lesson);
  try { progress = await (await fetch("/api/progress?subject=" + encodeURIComponent(subj))).json(); }
  catch (e) { progress = {}; }  // corrupt/missing progress → start fresh rather than fail to open
  const reviewsAll = await (await fetch("/api/reviews?subject=" + encodeURIComponent(subj))).json();
  reviews = reviewsAll;
  lastReviewsJSON = JSON.stringify(reviewsAll[file] || {});
  state = progress[lessonFile] || { currentBlock: 0, quiz: {} };
  state.totalBlocks = lesson.blocks.length;
  document.getElementById("title").textContent = lesson.title;
  // Question-type preference is PER SUBJECT: reuse this subject's recorded choice,
  // else ask now (each new module prompts again — it is not carried over globally).
  if (progress.prefs && typeof progress.prefs.freeText === "boolean") {
    freeTextEnabled = progress.prefs.freeText;
  } else {
    await askFreeTextPref();
  }
  saveProgress();  // record prefs (and mark the active subject) as soon as the lesson opens
  startPolling();
  renderLesson();
}

// Should this block be hidden (skipped) in the current mode/preference?
//  - In static mode, ALL assess blocks are hidden: they're pre-lesson diagnostics
//    for a live teacher, and there is none, so they're meaningless.
//  - When the student opted out of free-text, quiz-free and free-text assess
//    questions are hidden.
function blockHidden(b) {
  if (mode === "static" && b.type === "assess") return true;
  return !freeTextEnabled && (b.type === "quiz-free" || (b.type === "assess" && !b.options));
}

function renderLesson() {
  $app.innerHTML = "";
  pendingGraphs = [];
  // Advance past any block hidden in this mode/preference (free-text opt-out, or
  // assess blocks in static mode) — without touching the block array, so every
  // index (quiz state, reviews) stays aligned. A skipped assess still records an
  // answer so the "evaluation round finished" detection keeps firing.
  {
    let advanced = false;
    while (state.currentBlock < lesson.blocks.length && blockHidden(lesson.blocks[state.currentBlock])) {
      const b = lesson.blocks[state.currentBlock];
      if (b.type === "assess") {
        state.assessment = state.assessment || {};
        if (!state.assessment[state.currentBlock])
          state.assessment[state.currentBlock] = { skipped: true, ts: new Date().toISOString() };
      }
      state.currentBlock++;
      advanced = true;
    }
    if (advanced) saveProgress();
  }
  const upto = Math.min(state.currentBlock, lesson.blocks.length - 1);
  for (let i = 0; i <= upto; i++) {
    if (blockHidden(lesson.blocks[i])) continue;  // opted out of free-text — render nothing
    const node = renderBlock(lesson.blocks[i], i);
    if (i === upto && i > animatedThrough) { node.classList.add("reveal"); animatedThrough = i; }
    $app.appendChild(node);
  }
  if (state.currentBlock >= lesson.blocks.length) {
    const assessAll = lesson.blocks.length > 0 && lesson.blocks.every((b) => b.type === "assess");
    if (assessAll) {
      // An evaluation round is finished but the next step — more questions, or
      // the lesson itself — isn't authored yet. Wake the teacher and wait; the
      // poll reveals whatever it appends. Keyed on blocks.length so each new
      // round of questions re-notifies (supports rough- then fine-grained rounds).
      $app.appendChild(el("div", "block reveal awaiting-teacher", mode === "dynamic"
        ? "<b>Thanks!</b> Your teacher is looking at your answers — the next step appears here in a moment, no refresh needed."
        : "<b>Thanks!</b> (Static mode has no live teacher to build a lesson from these answers.)"));
      if (mode === "dynamic" && state.assessmentNotifiedLen !== lesson.blocks.length) {
        state.assessmentNotifiedLen = lesson.blocks.length;
        saveProgress();
        notify({ kind: "assessment-done", subject: subject, lesson: lessonFile });
      }
    } else {
      const pending = [];
      lesson.blocks.forEach((b, i) => {
        if (b.type === "quiz-choice" && needsReview(state.quiz[i])) pending.push(i);
      });
      if (pending.length) {
        $app.appendChild(renderReviewRound(pending));
      } else {
        const done = mode === "dynamic"
          ? "<b>Lesson complete! 🎉</b> Your teacher is preparing the next lesson — it'll appear here in a moment."
          : "<b>Lesson complete! 🎉</b> You've reached the end of the authored lessons.";
        $app.appendChild(el("div", "block reveal" + (mode === "dynamic" ? " awaiting-teacher" : ""), done));
        // Tell a live teacher the student is out of content — once per completion.
        if (mode === "dynamic" && !state.notifiedComplete) {
          state.notifiedComplete = true;
          saveProgress();
          notify({ kind: "lesson-complete", subject: subject, lesson: lessonFile });
        }
      }
    }
  }
  if (mode === "dynamic") $app.appendChild(feedbackBox());

  const toolbar = el("div", "toolbar");
  const back = el("button", "btn ghost", "← All lessons");
  back.onclick = () => { location.hash = ""; };
  const restart = el("button", "btn ghost", "⟲ Restart lesson");
  restart.onclick = () => {
    state = { currentBlock: 0, quiz: {}, totalBlocks: lesson.blocks.length };
    animatedThrough = -1;
    saveProgress();
    renderLesson();
  };
  const ftToggle = el("button", "btn ghost",
    freeTextEnabled ? "Questions: incl. free-text" : "Questions: multiple-choice only");
  ftToggle.title = "Toggle whether free-text (written) questions are shown";
  ftToggle.onclick = () => { setFreeTextPref(!freeTextEnabled); saveProgress(); renderLesson(); };
  toolbar.appendChild(back);
  toolbar.appendChild(restart);
  toolbar.appendChild(ftToggle);
  $app.appendChild(toolbar);
  renderMath($app);
  renderGraphs();
  updateProgressRail();
  reflectTeacherOnAwaiting();  // annotate any awaiting-teacher message with the last known presence
}

// One dot per content part (explanation/link/video/graph); quizzes are the
// tests between them. The "current" part is the last content block at or before
// the current position; everything before it is passed.
function blockTitle(b) {
  if (b.title) return b.title;
  if (b.type === "explanation" && b.markdown) {
    const m = b.markdown.match(/^#{1,6}\s+(.+)$/m);
    if (m) return m[1].replace(/[*_`$]/g, "");
  }
  return null;
}

function updateProgressRail() {
  const rail = document.getElementById("progress-rail");
  rail.innerHTML = "";
  const contentTypes = { explanation: 1, link: 1, video: 1, graph: 1 };
  const contentIdx = [];
  lesson.blocks.forEach((b, i) => { if (contentTypes[b.type]) contentIdx.push(i); });
  if (contentIdx.length < 2) return; // too small to bother
  const complete = state.currentBlock >= lesson.blocks.length;
  let currentPart = 0;
  contentIdx.forEach((bi, k) => { if (bi <= state.currentBlock) currentPart = k; });
  contentIdx.forEach((bi, k) => {
    const dot = el("span", "dot");
    if (complete || k < currentPart) dot.classList.add("passed");
    else if (k === currentPart) dot.classList.add("current");
    dot.title = (k + 1) + ". " + (blockTitle(lesson.blocks[bi]) || "Part " + (k + 1));
    if (bi <= state.currentBlock) {
      dot.onclick = () => {
        const t = document.querySelector(`[data-index="${bi}"]`);
        if (t) t.scrollIntoView({ behavior: "smooth", block: "start" });
      };
    }
    rail.appendChild(dot);
  });
}

// Plotly graphs are declarative: a block carries Plotly `data` and `layout`
// verbatim. We plot after the container is in the DOM so sizing is correct, and
// merge in theme-aware defaults (transparent background, text/grid colors) so the
// chart matches light/dark mode.
function deepMerge(base, over) {
  const out = Object.assign({}, base);
  for (const k in over) {
    const bv = base[k], ov = over[k];
    out[k] = (bv && ov && typeof bv === "object" && typeof ov === "object"
              && !Array.isArray(bv) && !Array.isArray(ov)) ? deepMerge(bv, ov) : ov;
  }
  return out;
}

function themedLayout(userLayout) {
  const cs = getComputedStyle(document.body);
  const text = cs.getPropertyValue("--text").trim();
  const border = cs.getPropertyValue("--border").trim();
  const base = {
    autosize: true, height: 380, margin: { l: 55, r: 20, t: 30, b: 45 },
    paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)",
    font: { color: text },
    xaxis: { gridcolor: border, zerolinecolor: border },
    yaxis: { gridcolor: border, zerolinecolor: border }
  };
  return deepMerge(base, userLayout || {});
}

function renderGraphs() {
  for (const g of pendingGraphs) {
    if (typeof Plotly === "undefined") { g.chart.textContent = "[Graph needs internet to render]"; continue; }
    try {
      Plotly.newPlot(g.chart, g.block.data || [], themedLayout(g.block.layout),
        { responsive: true, displaylogo: false });
    } catch (e) {
      g.chart.textContent = "[Graph failed to render: " + e.message + "]";
    }
  }
  pendingGraphs = [];
}

// Always-available channel for the student to message the teacher mid-lesson.
// Saved into progress.json (state.feedback); the teacher reads it and edits the
// not-yet-seen blocks, after which the student reloads and resumes from currentBlock.
function feedbackBox() {
  const wrap = el("div", "block feedbackbox",
    "<p>💬 <b>Message the teacher</b> (optional): stuck, want more detail, too hard or too easy? " +
    "Just write it and send — the teacher picks it up automatically and the lesson updates here, no terminal needed.</p>");
  const ta = el("textarea");
  ta.rows = 2;
  const btn = el("button", "btn primary", "Send feedback");
  const msg = el("span");
  msg.style.marginLeft = ".6em";
  btn.onclick = () => {
    const text = ta.value.trim();
    if (!text) { msg.className = "feedback-wrong"; msg.textContent = "Write something first."; return; }
    state.feedback = state.feedback || [];
    state.feedback.push({ block: state.currentBlock, text: text, ts: new Date().toISOString() });
    saveProgress();
    notify({ kind: "feedback", subject: subject, lesson: lessonFile, block: state.currentBlock });
    ta.value = "";
    msg.className = "feedback-right";
    msg.textContent = "Sent — the teacher will pick it up and the lesson will update here automatically.";
  };
  const row = el("div");
  row.style.marginTop = ".6em";
  row.appendChild(btn);
  row.appendChild(msg);
  wrap.appendChild(ta);
  wrap.appendChild(row);
  return wrap;
}

function unlockNext() {
  state.currentBlock++;
  saveProgress();
  renderLesson();
  // Bring the newly revealed block into view, but with scroll-margin-top above it
  // so the block just completed (e.g. its "Correct!" feedback) stays visible.
  const target = document.querySelector(`[data-index="${state.currentBlock}"]`);
  if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
  else window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

function continueButton() {
  const btn = el("button", "btn primary", "Continue →");
  btn.onclick = unlockNext;
  return btn;
}

// The orienting "lead" sentence goes in its own callout, placed just after the
// block's title heading (or at the top if there's none).
function insertLead(div, lead) {
  const box = el("div", "lead", marked.parseInline(lead));
  const heading = div.querySelector("h1, h2, h3, h4, h5, h6");
  if (heading && heading.parentNode === div) heading.after(box);
  else div.insertBefore(box, div.firstChild);
}

function renderBlock(block, index) {
  const div = el("div", "block " + block.type);
  div.dataset.index = index;
  const isCurrent = index === state.currentBlock;

  if (block.type === "explanation") {
    div.innerHTML = marked.parse(block.markdown);
    if (block.lead) insertLead(div, block.lead);
    if (isCurrent) div.appendChild(continueButton());
  } else if (block.type === "link") {
    div.innerHTML = `<a href="${block.url}" target="_blank">${block.title}</a><p>${block.why || ""}</p>`;
    if (isCurrent) div.appendChild(continueButton());
  } else if (block.type === "video") {
    const yt = (block.url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/) || [])[1];
    const player = yt
      ? `<div class="video-embed"><iframe src="https://www.youtube.com/embed/${yt}" allowfullscreen></iframe></div>
         <small>Video not playing? Some owners disable embedding — <a href="${block.url}" target="_blank">watch it on YouTube</a>.</small>`
      : `<a href="${block.url}" target="_blank">▶ ${block.title}</a>`;
    div.innerHTML = `<p><b>${block.title}</b></p>${player}<p>${block.focus || ""}</p>`;
    if (isCurrent) div.appendChild(continueButton());
  } else if (block.type === "graph") {
    if (block.title) div.appendChild(el("p", null, `<b>${block.title}</b>`));
    const chart = el("div", "plotly-graph");
    div.appendChild(chart);
    pendingGraphs.push({ chart: chart, block: block });
    if (block.caption) div.appendChild(el("p", "caption", block.caption));
    if (isCurrent) div.appendChild(continueButton());
  } else if (block.type === "quiz-choice") {
    renderQuiz(div, block, index);
  } else if (block.type === "quiz-free") {
    renderFree(div, block, index);
  } else if (block.type === "assess") {
    renderAssess(div, block, index);
  } else {
    div.textContent = `[Unsupported block type: ${block.type}]`;
    if (isCurrent) div.appendChild(continueButton());
  }
  return div;
}

function newQuizState(block) {
  // Shuffle option order once, so the correct answer is not always in the same
  // position regardless of how the teacher ordered them in the JSON.
  const order = block.options.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  return { retries: 0, correct: false, revealed: false, order: order };
}

function renderQuiz(div, block, index) {
  let qs = state.quiz[index];
  if (!qs) { qs = state.quiz[index] = newQuizState(block); saveProgress(); }
  if (!qs.order || qs.order.length !== block.options.length) qs.order = newQuizState(block).order;

  // During the end-of-lesson review, hide the answer in the original occurrence
  // so scrolling up to re-read the content doesn't reveal it.
  if (state.currentBlock >= lesson.blocks.length && needsReview(qs)) {
    div.classList.add("review-hidden");
    div.innerHTML = `<div class="qlabel">Quiz</div><div class="qtext">${block.question}</div>`;
    const form = el("form", "options");
    qs.order.forEach((origIdx) => {
      form.appendChild(el("label", "option",
        `<input type="radio" disabled> <span>${block.options[origIdx]}</span>`));
    });
    div.appendChild(form);
    div.appendChild(el("div", "hint", "🔒 Answer hidden — re-answer this in the review round at the bottom of the lesson."));
    return;
  }

  const answered = qs.correct || qs.revealed;
  div.classList.add(qs.correct ? "correct" : qs.revealed ? "revealed" : "open");
  div.innerHTML = `<div class="qlabel">Quiz</div><div class="qtext">${block.question}</div>`;

  const form = el("form", "options");
  qs.order.forEach((origIdx) => {
    const checked = answered && origIdx === block.answer ? "checked" : "";
    const label = el("label", "option",
      `<input type="radio" name="q${index}" value="${origIdx}" ${checked} ${answered ? "disabled" : ""}> <span>${block.options[origIdx]}</span>`);
    form.appendChild(label);
  });
  div.appendChild(form);

  const feedback = el("p");
  div.appendChild(feedback);
  if (qs.correct) { feedback.className = "feedback-right"; feedback.textContent = "Correct!"; }
  if (qs.revealed) { feedback.className = "feedback-wrong"; feedback.textContent = "Answer shown: " + block.options[block.answer]; }
  if (answered) return;

  const hints = block.hints || [];
  for (let h = 0; h < Math.min(qs.retries, hints.length); h++) {
    div.appendChild(el("div", "hint", "<b>Hint:</b> " + hints[h]));
  }

  const check = el("button", "btn primary", "Check answer");
  check.onclick = () => {
    const sel = form.querySelector("input:checked");
    if (!sel) { feedback.className = "feedback-wrong"; feedback.textContent = "Pick an answer first."; return; }
    if (Number(sel.value) === block.answer) {
      qs.correct = true;
      unlockNext();
    } else {
      qs.retries++;
      saveProgress();
      renderLesson();
    }
  };
  div.appendChild(check);

  if (qs.retries >= hints.length && qs.retries > 0) {
    const reveal = el("button", "btn ghost", "Show answer");
    reveal.onclick = () => { qs.revealed = true; unlockNext(); };
    div.appendChild(reveal);
  }
  if (qs.retries > 0) {
    feedback.className = "feedback-wrong";
    feedback.textContent = "Not quite — try again.";
  }
}

// A quiz was "missed" if it took a retry or the answer was revealed; such
// questions are re-quizzed at the end until cleared (spaced retrieval).
function quizMissed(qs) { return !!qs && (qs.retries > 0 || qs.revealed); }
function needsReview(qs) { return quizMissed(qs) && !qs.reviewCleared; }

function renderReviewRound(pending) {
  const wrap = el("div", "block reveal review-round");
  wrap.appendChild(el("h2", null, "🔁 Review round"));
  wrap.appendChild(el("p", "caption",
    "You missed these earlier. Answer them again — no hints this time. Scroll up to re-read the material if you need to (the answers there are hidden)."));
  pending.forEach((i) => wrap.appendChild(renderReviewItem(lesson.blocks[i], i)));
  return wrap;
}

function renderReviewItem(block, index) {
  const qs = state.quiz[index];
  if (!qs.reviewOrder || qs.reviewOrder.length !== block.options.length) {
    qs.reviewOrder = newQuizState(block).order;  // reshuffle so position isn't memorised
    saveProgress();
  }
  const div = el("div", "review-item");
  div.innerHTML = `<div class="qtext">${block.question}</div>`;
  const form = el("form", "options");
  qs.reviewOrder.forEach((origIdx) => {
    form.appendChild(el("label", "option",
      `<input type="radio" name="rv${index}" value="${origIdx}"> <span>${block.options[origIdx]}</span>`));
  });
  div.appendChild(form);
  const feedback = el("p");
  div.appendChild(feedback);

  const attempts = qs.reviewAttempts || 0;
  const check = el("button", "btn primary", "Check answer");
  check.onclick = () => {
    const sel = form.querySelector("input:checked");
    if (!sel) { feedback.className = "feedback-wrong"; feedback.textContent = "Pick an answer first."; return; }
    if (Number(sel.value) === block.answer) {
      qs.reviewCleared = true; saveProgress(); renderLesson();
    } else {
      qs.reviewAttempts = attempts + 1; saveProgress(); renderLesson();
    }
  };
  div.appendChild(check);

  if (attempts >= 3) {
    const reveal = el("button", "btn ghost", "Show answer");
    reveal.onclick = () => { qs.reviewCleared = true; qs.reviewRevealed = true; saveProgress(); renderLesson(); };
    div.appendChild(reveal);
  }
  if (attempts > 0) {
    feedback.className = "feedback-wrong";
    feedback.textContent = "Not quite — scroll up to re-read the material, then try again.";
  }
  return div;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;").replace(/\n/g, "<br>");
}

function reviewFor(index) {
  const r = reviews[lessonFile];
  return r && r.answers ? r.answers[String(index)] : undefined;
}

function renderReference(div, block) {
  if (!block.reference) return;
  const btn = el("button", "btn ghost", "Reveal reference answer & self-check");
  const ref = el("div", "review");
  ref.style.display = "none";
  ref.innerHTML = "<b>Reference answer:</b> " + block.reference;
  btn.onclick = () => { ref.style.display = "block"; btn.style.display = "none"; renderMath(ref); };
  div.appendChild(btn);
  div.appendChild(ref);
}

// Diagnostic assessment question shown before the lesson: no right/wrong, no
// hints, no grading — it just records the answer. When the student finishes the
// current evaluation questions, the teacher reads them (via progress.json) and
// either asks a finer round or authors the lesson. `options` present → single-
// choice; absent → free text. Answers live in state.assessment[index].
function renderAssess(div, block, index) {
  state.assessment = state.assessment || {};
  const a = state.assessment[index];
  const isCurrent = index === state.currentBlock;
  div.innerHTML = `<div class="qlabel">About you</div><div class="qtext">${block.question}</div>`;

  // Answered and scrolled past: show it read-only.
  if (a && !isCurrent) {
    const shown = block.options ? block.options[a.choice] : a.text;
    div.appendChild(el("div", "your-answer", "<b>Your answer:</b> " + escapeHtml(shown || "(skipped)")));
    return;
  }

  const msg = el("p");
  const advance = (record) => { state.assessment[index] = Object.assign(record, { ts: new Date().toISOString() }); saveProgress(); unlockNext(); };

  if (block.options) {
    const form = el("form", "options");
    block.options.forEach((opt, i) => {
      const checked = a && a.choice === i ? "checked" : "";
      form.appendChild(el("label", "option",
        `<input type="radio" name="assess${index}" value="${i}" ${checked}> <span>${opt}</span>`));
    });
    div.appendChild(form);
    div.appendChild(msg);
    if (isCurrent) {
      const btn = el("button", "btn primary", "Continue →");
      btn.onclick = () => {
        const sel = form.querySelector("input:checked");
        if (!sel) { msg.className = "feedback-wrong"; msg.textContent = "Pick an answer first."; return; }
        advance({ choice: Number(sel.value) });
      };
      div.appendChild(btn);
    }
  } else {
    const ta = el("textarea");
    ta.rows = 3;
    ta.placeholder = "Type your answer (leave blank if you're not sure). You can use $...$ for LaTeX.";
    if (a && a.text) ta.value = a.text;
    div.appendChild(ta);
    div.appendChild(msg);
    if (isCurrent) {
      const btn = el("button", "btn primary", "Continue →");
      btn.onclick = () => advance({ text: ta.value.trim() });
      div.appendChild(btn);
    }
  }
}

// Free-text / LaTeX answer. In dynamic mode a live Claude session reviews it
// (the live /teach-me loop writes reviews.json, which the GUI polls). In static mode the
// student self-checks against an optional reference answer.
function renderFree(div, block, index) {
  state.freeAnswers = state.freeAnswers || {};
  const fa = state.freeAnswers[index];
  const isCurrent = index === state.currentBlock;
  div.innerHTML = `<div class="qlabel">Free response</div><div class="qtext">${block.question}</div>`;

  if (!fa) {
    const ta = el("textarea");
    ta.rows = 4;
    ta.placeholder = "Type your answer. You can use $...$ for LaTeX.";
    div.appendChild(ta);
    const preview = el("div", "caption");
    div.appendChild(preview);
    ta.oninput = () => { preview.textContent = ta.value; renderMath(preview); };
    const submit = el("button", "btn primary", "Submit answer");
    const msg = el("span");
    msg.style.marginLeft = ".6em";
    submit.onclick = () => {
      const text = ta.value.trim();
      if (!text) { msg.className = "feedback-wrong"; msg.textContent = "Write an answer first."; return; }
      state.freeAnswers[index] = { text: text, ts: new Date().toISOString(),
        status: mode === "static" ? "self" : "submitted" };
      saveProgress();
      notify({ kind: "free-answer", subject: subject, lesson: lessonFile, block: index });
      renderLesson();
    };
    const row = el("div");
    row.style.marginTop = ".6em";
    row.appendChild(submit);
    row.appendChild(msg);
    div.appendChild(row);
    return;
  }

  div.appendChild(el("div", "your-answer", "<b>Your answer:</b><br>" + escapeHtml(fa.text)));

  let review = reviewFor(index);
  // A review carries the ts of the answer it judged; if the student has since
  // resubmitted, the old verdict is stale and must not be shown against the new answer.
  if (review && review.answeredTs && review.answeredTs !== fa.ts) review = null;
  if (review) {
    const cls = review.verdict === "correct" ? "correct" : review.verdict === "incorrect" ? "incorrect" : "";
    div.appendChild(el("div", "review " + cls,
      "<b>Teacher review (" + review.verdict + "):</b> " + review.comment));
  } else if (mode === "dynamic") {
    div.appendChild(el("div", "hint awaiting-teacher",
      "Answer submitted — your teacher is reviewing it. The verdict will appear here automatically."));
  }

  if (mode === "static") renderReference(div, block);

  if (isCurrent) {
    const canContinue = review || mode === "static" || fa.continued;
    if (canContinue) {
      div.appendChild(continueButton());
    } else {
      const esc = el("button", "btn ghost", "Continue without review");
      esc.onclick = () => { fa.continued = true; saveProgress(); unlockNext(); };
      div.appendChild(esc);
    }
  }
}

// --- Live updates: poll the read-only Claude-owned files while a lesson is open ---
function startPolling() { stopPolling(); pollTimer = setInterval(pollUpdates, 3000); }
function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

async function pollUpdates() {
  if (!subject || !lessonFile) return;
  try {
    const newLesson = await (await fetch(`/api/lesson?subject=${encodeURIComponent(subject)}&lesson=${encodeURIComponent(lessonFile)}`)).json();
    const newReviewsAll = await (await fetch("/api/reviews?subject=" + encodeURIComponent(subject))).json();
    const ljson = JSON.stringify(newLesson);
    const rjson = JSON.stringify(newReviewsAll[lessonFile] || {});
    if (ljson === lastLessonJSON && rjson === lastReviewsJSON) return;      // nothing new
    if (document.activeElement && document.activeElement.tagName === "TEXTAREA") return; // don't clobber typing; retry next cycle
    lesson = newLesson; lastLessonJSON = ljson;
    reviews = newReviewsAll; lastReviewsJSON = rjson;
    state.totalBlocks = lesson.blocks.length;
    renderLesson();
  } catch (e) { /* transient; try again next tick */ }
}

// --- Teacher-presence badge: is a live /teach-me session actually listening? ---
// The server counts active /api/wait long-polls (_waiters) and exposes /api/teacher.
// We poll it and show a live badge, so the student never waits on a review that no
// one will ever write. A short grace period covers the moments a busy teacher is
// authoring (and thus momentarily not parked in /api/wait).
function startTeacherPolling() {
  if (mode !== "dynamic") return;
  stopTeacherPolling();
  pollTeacher();
  teacherTimer = setInterval(pollTeacher, 3000);
}
function stopTeacherPolling() { if (teacherTimer) { clearInterval(teacherTimer); teacherTimer = null; } }

function setBadge(state, text) {
  teacherState = state;
  const badge = document.getElementById("teacher-badge");
  badge.style.display = "inline-flex";
  badge.className = state;
  badge.innerHTML = '<span class="tb-dot"></span>' + text;
  reflectTeacherOnAwaiting();
}

async function pollTeacher() {
  const badge = document.getElementById("teacher-badge");
  if (mode !== "dynamic") { badge.style.display = "none"; return; }
  let online = false, serverDown = false;
  try {
    online = !!(await (await fetch("/api/teacher")).json()).online;
  } catch (e) { serverDown = true; }

  if (serverDown) { teacherOfflineSince = null; setBadge("down", "Server not running"); return; }
  if (online)     { teacherOfflineSince = null; setBadge("online", "Teacher connected"); return; }
  // No listener right now — could be a teacher mid-authoring, so hold a grace period.
  if (teacherOfflineSince === null) teacherOfflineSince = Date.now();
  if (Date.now() - teacherOfflineSince < TEACHER_GRACE_MS) setBadge("working", "Teacher working…");
  else setBadge("offline", "No teacher — run /teach-me");
}

// When we're sure no teacher is connected, tell the student on any "awaiting the
// teacher" message so a killed/absent session doesn't read as an endless wait.
function reflectTeacherOnAwaiting() {
  const stalled = teacherState === "offline" || teacherState === "down";
  document.querySelectorAll(".awaiting-teacher").forEach((elm) => {
    let note = elm.querySelector(".tb-note");
    if (stalled) {
      if (!note) { note = el("div", "tb-note"); elm.appendChild(note); }
      note.innerHTML = teacherState === "down"
        ? "⚠️ The server isn't running, so nothing is listening. Restart it and run <code>/teach-me</code> to continue."
        : "⚠️ No live teacher is connected, so this won't progress on its own. In your Claude Code terminal, run <code>/teach-me</code> to resume — your answers are saved.";
    } else if (note) {
      note.remove();
    }
  });
}

// --- Question-type preference: free-text (written) questions, or multiple-choice only ---
// The real store is PER SUBJECT (progress.prefs.freeText), so the teaching/reading
// session authors the right kind of question and each new module is asked afresh.
// localStorage only remembers the last choice as the default toolbar state before a
// subject is open; it never suppresses the per-subject prompt (that was the old bug).
function loadFreeTextPref() {
  const v = localStorage.getItem("kalilmod.freeText");
  return v === null ? null : v === "on";
}
function setFreeTextPref(on) {
  freeTextEnabled = on;
  localStorage.setItem("kalilmod.freeText", on ? "on" : "off");
}
function askFreeTextPref() {
  return new Promise((resolve) => {
    const overlay = el("div", "overlay");
    const card = el("div", "overlay-card",
      "<h2>How do you want to be quizzed?</h2>" +
      "<p>Free-text questions ask you to write an answer in your own words (reviewed live). " +
      "Multiple-choice only keeps every question a pick-one — quicker, no writing.</p>");
    const both = el("button", "btn primary", "Include free-text questions");
    const mc = el("button", "btn ghost", "Multiple-choice only");
    both.onclick = () => { setFreeTextPref(true); overlay.remove(); resolve(); };
    mc.onclick = () => { setFreeTextPref(false); overlay.remove(); resolve(); };
    card.appendChild(both);
    card.appendChild(mc);
    overlay.appendChild(card);
    document.body.appendChild(overlay);
  });
}

// --- Routing: the URL hash holds the open lesson so refresh (F5) restores it ---
function route() {
  const params = new URLSearchParams(location.hash.slice(1));
  const s = params.get("subject"), l = params.get("lesson");
  if (s && l) {
    if (s === subject && l === lessonFile) return; // already open
    openLesson(s, l);
  } else {
    main();
  }
}

async function boot() {
  try { mode = (await (await fetch("/api/mode")).json()).mode; } catch (e) { /* default dynamic */ }
  // The question-type preference is asked per subject in openLesson (not once,
  // globally, here) so a new module never silently inherits an earlier choice.
  // Seed a harmless default for the picker; loadFreeTextPref is only a suggestion.
  const pref = loadFreeTextPref();
  if (pref !== null) freeTextEnabled = pref;
  window.addEventListener("hashchange", route);
  startTeacherPolling();  // dynamic mode only; badge shows whether a teacher is listening
  route();
}
boot();
</script>
</body>
</html>
